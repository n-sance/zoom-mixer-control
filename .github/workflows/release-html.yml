name: Release Assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub Release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  build-and-upload-html:
    runs-on: ubuntu-latest
    needs:
      - create-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build single-file HTML
        run: npm run build:html

      - name: Upload HTML to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l6max-web-midi-controller-html
          path: dist/l6max-web-midi-controller.html

      - name: Upload factory config to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l6max-factory-config
          path: configs/factory-default.json

      - name: Upload web assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release upload "${{ github.ref_name }}"
          dist/l6max-web-midi-controller.html
          configs/factory-default.json
          --clobber

  build-and-upload-macos:
    runs-on: macos-latest
    needs:
      - create-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build macOS desktop artifacts
        run: npm run desktop:build:mac

      - name: Create stable macOS asset names
        run: |
          cp apps/desktop/electron/dist/*-arm64.dmg apps/desktop/electron/dist/zoom-l6max-controller-macos-arm64.dmg
          cp apps/desktop/electron/dist/*-arm64-mac.zip apps/desktop/electron/dist/zoom-l6max-controller-macos-arm64.zip

      - name: Upload macOS artifacts to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l6max-macos-build
          path: |
            apps/desktop/electron/dist/zoom-l6max-controller-macos-arm64.dmg
            apps/desktop/electron/dist/zoom-l6max-controller-macos-arm64.zip

      - name: Upload macOS assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release upload "${{ github.ref_name }}"
          apps/desktop/electron/dist/zoom-l6max-controller-macos-arm64.dmg
          apps/desktop/electron/dist/zoom-l6max-controller-macos-arm64.zip
          --clobber
